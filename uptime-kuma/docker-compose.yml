services:

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # All monitors, settings, and history stored on host
      - ./data:/app/data
    environment:
      TZ: ${TZ}
    env_file:
      - path: .env
        required: false
