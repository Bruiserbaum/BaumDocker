services:

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == ${BULK_NODE:-TuringPICompute3}
    ports:
      - "8096:8096"     # HTTP web UI
      - "8920:8920"     # HTTPS web UI (optional)
      - "7359:7359/udp" # LAN auto-discovery
      - "1900:1900/udp" # DLNA (optional — remove if not using DLNA clients)
    volumes:
      # Jellyfin config, database, and metadata cache
      - ./config:/config
      # Fast disk for transcoding temp files (RAM disk or SSD recommended)
      - ./cache:/cache
      # Media libraries — paths set in .env pointing to your external drive
      - ${MOVIES_PATH:-/mnt/gluster-bulk/media/movies}:/movies
      - ${TV_PATH:-/mnt/gluster-bulk/media/tv}:/tv
      - ${MUSIC_PATH:-/mnt/gluster-bulk/media/music}:/music
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # JELLYFIN_PublishedServerUrl: ${JELLYFIN_PublishedServerUrl}  # uncomment for reverse proxy

    # ── Intel Quick Sync / AMD VAAPI (uncomment to enable) ────────────────────
    # devices:
    #   - /dev/dri:/dev/dri

    # ── NVIDIA GPU (uncomment to enable) ──────────────────────────────────────
    # environment:
    #   NVIDIA_VISIBLE_DEVICES: all
    #   NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    # Note: if adding GPU resources under deploy.resources.reservations,
    # merge it into the deploy block above rather than duplicating deploy keys.
