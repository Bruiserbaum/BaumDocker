services:

  web:
    image: ghcr.io/karakeep-app/karakeep:latest
    container_name: Karakeep-WEB
    restart: on-failure:5
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"
    depends_on:
      - meilisearch
      - chrome
    environment:
      MEILI_ADDR: http://meilisearch:7700
      DISABLE_SIGNUPS: true
      INFERENCE_ENABLE_AUTO_SUMMARIZATION: true
      CRAWLER_FULL_PAGE_ARCHIVE: true
      CRAWLER_VIDEO_DOWNLOAD: true
      CRAWLER_ENABLE_ADBLOCKER: true
      BROWSER_WEB_URL: http://chrome:9222
      DATA_DIR: /data
      # Your public URL — used for auth callbacks (e.g. https://karakeep.yourdomain.com)
      NEXTAUTH_URL: REPLACE_WITH_YOUR_URL
      # Generate with: openssl rand -hex 32
      NEXTAUTH_SECRET: REPLACE_WITH_HEX_SECRET
      # Must match MEILI_MASTER_KEY below — generate with: openssl rand -hex 32
      MEILI_MASTER_KEY: REPLACE_WITH_HEX_SECRET
      OPENAI_API_KEY: REPLACE_WITH_API_KEY   # optional — remove if not using AI summarization

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:123
    container_name: Karakeep-CHROME
    restart: on-failure:5
    command:
      - --no-sandbox
      - --disable-gpu
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: Karakeep-MEILI
    restart: on-failure:5
    volumes:
      - ./meilisearch:/meili_data
    environment:
      # Must match MEILI_MASTER_KEY above
      MEILI_MASTER_KEY: REPLACE_WITH_HEX_SECRET
      MEILI_NO_ANALYTICS: true
