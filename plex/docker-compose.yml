services:

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    # Host network gives Plex full LAN visibility for GDM auto-discovery.
    # Remove and use ports: below if you prefer bridge networking.
    network_mode: host
    restart: unless-stopped
    volumes:
      # Plex config, metadata, and database
      - ./config:/config
      # Media libraries — paths set in .env pointing to your external drive
      - ${MOVIES_PATH}:/movies
      - ${TV_PATH}:/tv
      - ${MUSIC_PATH}:/music
      # Transcode scratch space — fast local SSD or RAM disk recommended
      - ${TRANSCODE_PATH:-/tmp/plex-transcode}:/transcode
    environment:
      TZ: ${TZ:-America/Chicago}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      PLEX_CLAIM: ${PLEX_CLAIM}
      # Hardware transcoding — uncomment your platform (requires Plex Pass)
      # NVIDIA_VISIBLE_DEVICES: all
      # NVIDIA_DRIVER_CAPABILITIES: compute,video,utility

    # Uncomment for NVIDIA GPU transcoding:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

# ── Bridge networking alternative ─────────────────────────────────────────────
# If you remove network_mode: host, expose these ports instead:
# ports:
#   - "32400:32400"     # Plex Media Server
#   - "1900:1900/udp"   # DLNA
#   - "5353:5353/udp"   # Bonjour/Avahi
#   - "8324:8324"       # Roku via Plex Companion
#   - "32410:32410/udp" # GDM network discovery
#   - "32412:32412/udp"
#   - "32413:32413/udp"
#   - "32414:32414/udp"
#   - "32469:32469"     # DLNA
