name: nextcloud-aio

services:
  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    container_name: nextcloud-aio-mastercontainer
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # optional — override Nextcloud data directory location
      # - /mnt/your-drive/nextcloud:/mnt/ncdata  # also set NEXTCLOUD_DATADIR below
    network_mode: bridge
    ports:
      - "80:80"
      - "8080:8080"
      - "8443:8443"
    environment:
      # optional — store Nextcloud data on a specific drive
      # NEXTCLOUD_DATADIR: /mnt/ncdata
      # optional — skip the domain check (use if behind a reverse proxy without a domain)
      # SKIP_DOMAIN_VALIDATION: true
      # optional — max upload size
      # PHP_UPLOAD_LIMIT: 10G
      # optional — PHP memory limit
      # PHP_MEMORY_LIMIT: 512M
      pass: ""  # required placeholder — do not remove

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
