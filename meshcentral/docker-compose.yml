services:
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    restart: unless-stopped
    ports:
      # MeshCentral serves HTTPS on port 4430 internally.
      # Point NPM at <host-ip>:4430 with WebSockets enabled.
      # Agents install via NPM's public domain (port 443 externally).
      - "4430:4430"
    environment:
      - HOSTNAME=${HOSTNAME:-mesh.yourdomain.com}
      - PORT=${PORT:-4430}
      - ALLOW_NEW_ACCOUNTS=${ALLOW_NEW_ACCOUNTS:-false}
      - ALLOW_PLUGINS=${ALLOW_PLUGINS:-false}
      - WEBRTC=${WEBRTC:-false}
      - IFRAME=${IFRAME:-false}
      - MINIFY=${MINIFY:-true}
      # Set REVERSE_PROXY to your NPM container's IP so MeshCentral trusts
      # X-Forwarded-For headers. Leave blank for standalone (no NPM).
      - REVERSE_PROXY=${REVERSE_PROXY:-}
      - REVERSE_PROXY_TLS_PORT=${REVERSE_PROXY_TLS_PORT:-443}
      # Uncomment to use MongoDB instead of the embedded NeDB (< 100 devices)
      # - USE_MONGODB=true
      # - MONGO_URL=${MONGO_URL:-}
    volumes:
      - meshcentral-data:/opt/meshcentral/meshcentral-data
      - meshcentral-backups:/opt/meshcentral/meshcentral-backups
      - meshcentral-files:/opt/meshcentral/meshcentral-files
      - meshcentral-web:/opt/meshcentral/meshcentral-web
    healthcheck:
      test: ["CMD", "curl", "-kfs", "https://localhost:4430/health.ashx"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == TuringPiRK1

volumes:
  meshcentral-data:
  meshcentral-backups:
  meshcentral-files:
  meshcentral-web:
