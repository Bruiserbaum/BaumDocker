services:
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    restart: unless-stopped
    ports:
      # Standalone mode (no reverse proxy): MeshCentral serves HTTPS on 443.
      # NPM mode: set REVERSE_PROXY below and point NPM at this host on port 443.
      # Agents always connect on 443. Remove 80 if NPM handles HTTP redirects.
      - "443:443"
      - "80:80"
    environment:
      - HOSTNAME=${HOSTNAME:-mesh.yourdomain.com}
      - ALLOW_NEW_ACCOUNTS=${ALLOW_NEW_ACCOUNTS:-false}
      - ALLOW_PLUGINS=${ALLOW_PLUGINS:-false}
      - WEBRTC=${WEBRTC:-false}
      - IFRAME=${IFRAME:-false}
      - MINIFY=${MINIFY:-true}
      # Reverse proxy settings — set REVERSE_PROXY to your NPM/nginx container IP
      # so MeshCentral trusts X-Forwarded-For and accepts HTTP from the proxy.
      - REVERSE_PROXY=${REVERSE_PROXY:-}
      - REVERSE_PROXY_TLS_PORT=${REVERSE_PROXY_TLS_PORT:-443}
      # Uncomment to use MongoDB instead of the embedded NeDB (< 100 devices)
      # - USE_MONGODB=true
      # - MONGO_URL=${MONGO_URL:-}
    volumes:
      - meshcentral-data:/opt/meshcentral/meshcentral-data
      - meshcentral-backups:/opt/meshcentral/meshcentral-backups
      - meshcentral-files:/opt/meshcentral/meshcentral-files
      - meshcentral-web:/opt/meshcentral/meshcentral-web
    healthcheck:
      test: ["CMD", "curl", "-kfs", "https://localhost:443/health.ashx"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == TuringPiRK1

volumes:
  meshcentral-data:
  meshcentral-backups:
  meshcentral-files:
  meshcentral-web:
