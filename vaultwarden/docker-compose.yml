# Vaultwarden — self-hosted Bitwarden-compatible password manager
# See .env.example for required variables

services:

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == ${FAST_NODE:-TuringPiRK1}
    ports:
      - "8222:80"
    volumes:
      # All vault data, attachments, and config stored on host
      - ${DATA_FOLDER}:/data
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      SIGNUPS_ALLOWED: ${SIGNUPS_ALLOWED:-false}
      # Uncomment to enable email (SMTP) notifications
      # SMTP_HOST: ${SMTP_HOST}
      # SMTP_FROM: ${SMTP_FROM}
      # SMTP_PORT: ${SMTP_PORT:-587}
      # SMTP_SECURITY: ${SMTP_SECURITY:-starttls}
      # SMTP_USERNAME: ${SMTP_USERNAME}
      # SMTP_PASSWORD: ${SMTP_PASSWORD}
      # Authentik SSO — uncomment and fill in .env to enable (requires Vaultwarden 1.32.0+)
      # SSO_ENABLED: ${SSO_ENABLED:-false}
      # SSO_ONLY: ${SSO_ONLY:-false}
      # SSO_AUTHORITY: ${SSO_AUTHORITY}
      # SSO_CLIENT_ID: ${SSO_CLIENT_ID}
      # SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET}
