services:

  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      # Calibre-Web config and database
      - ./config:/config
      # Your Calibre library — must contain a metadata.db file (created by Calibre desktop app)
      - ${BOOKS_PATH:-/mnt/gluster-bulk/calibre}:/books
    environment:
      TZ: ${TZ}
      # Run as your host user to avoid permission issues
      PUID: ${PUID}
      PGID: ${PGID}
      # Optional — enables the Calibre content server for OPDS and direct downloads
      DOCKER_MODS: linuxserver/mods:universal-calibre
