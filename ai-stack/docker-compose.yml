services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - ai_frontend
      - ai_backend
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PARALLEL: 2
      OLLAMA_MAX_LOADED_MODELS: 2
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 5
        ollama list | grep -q "qwen2.5:7b-instruct" || ollama pull qwen2.5:7b-instruct
        ollama list | grep -q "qwen3-coder:14b"       || ollama pull qwen3-coder:14b
        ollama list | grep -q "llama3.2:3b"          || ollama pull llama3.2:3b
        wait

  mongodb:
    image: mongo:7
    container_name: librechat-mongodb
    restart: unless-stopped
    networks:
      - ai_backend
    volumes:
      - mongo:/data/db
    environment:
      MONGO_INITDB_DATABASE: LibreChat

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    depends_on:
      - mongodb
      - ollama
    networks:
      - ai_frontend
      - ai_backend
    ports:
      - "3000:3080"
    environment:
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      OLLAMA_BASE_URL: http://ollama:11434
      ALLOW_EMAIL_LOGIN: true
      ALLOW_REGISTRATION: false
      ALLOW_UNVERIFIED_EMAIL_LOGIN: true
      CONFIG_BYPASS_VALIDATION: false
      JWT_SECRET: ${LIBRECHAT_JWT_SECRET}
      CREDS_KEY: ${LIBRECHAT_CREDS_KEY}
      SESSION_SECRET: ${LIBRECHAT_SESSION_SECRET}
      REFRESH_TOKEN_SECRET: ${LIBRECHAT_REFRESH_TOKEN_SECRET}
      JWT_REFRESH_SECRET: ${LIBRECHAT_JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Authentik SSO — uncomment all lines below and set vars in Portainer to enable OIDC login
      # OPENID_ISSUER format: http://YOUR_AUTHENTIK_HOST:9100/application/o/librechat/.well-known/openid-configuration
      # OPENID_ISSUER: ${LIBRECHAT_OPENID_ISSUER}
      # OPENID_CLIENT_ID: ${LIBRECHAT_OPENID_CLIENT_ID}
      # OPENID_CLIENT_SECRET: ${LIBRECHAT_OPENID_CLIENT_SECRET}
      # OPENID_SESSION_SECRET: ${LIBRECHAT_OPENID_SESSION_SECRET}
      # OPENID_SCOPE: openid profile email
      # OPENID_CALLBACK_URL: /oauth/openid/callback
      # OPENID_BUTTON_LABEL: Login with Authentik
      # OPENID_IMAGE_URL: https://cdn.jsdelivr.net/gh/selfhst/icons/png/authentik.png
      # OPENID_GENERATE_NONCE: "true"
      # OPENID_USE_END_SESSION_ENDPOINT: "true"
    volumes:
      - /opt/librechat/librechat.yaml:/app/librechat.yaml:ro
      - librechat_uploads:/app/client/public/uploads
      - librechat_data:/app/data

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      - ai_frontend
      - ai_backend
    ports:
      - "3001:3001"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      STORAGE_DIR: /app/server/storage
      JWT_SECRET: ${ANYTHINGLLM_JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - anythingllm_storage:/app/server/storage

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    depends_on:
      - ollama
      - anythingllm
    networks:
      - ai_frontend
      - ai_backend
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      OLLAMA_BASE_URL: http://ollama:11434
      ANYTHINGLLM_BASE_URL: http://anythingllm:3001
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      GENERIC_TIMEZONE: ${TIMEZONE}
    volumes:
      - n8n_data:/home/node/.n8n

  openhands:
    image: ghcr.io/all-hands-ai/openhands:latest
    container_name: openhands
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      - ai_frontend
      - ai_backend
    ports:
      - "3002:3000"
    environment:
      LLM_MODEL: ${OPENHANDS_LLM_MODEL}
      LLM_BASE_URL: http://ollama:11434
      LLM_API_KEY: ollama
      # Host path shared with sandbox containers — must be an absolute host path, not a named volume
      SANDBOX_VOLUMES: /opt/openhands/workspace:/opt/openhands/workspace:rw
      SANDBOX_RUNTIME_CONTAINER_IMAGE: ghcr.io/all-hands-ai/runtime:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/openhands/workspace:/opt/openhands/workspace
      - openhands_state:/root/.openhands-state

networks:
  ai_frontend:
    driver: bridge
  ai_backend:
    driver: bridge

volumes:
  ollama:
  mongo:
  librechat_uploads:
  librechat_data:
  anythingllm_storage:
  n8n_data:
  openhands_workspace:
  openhands_state:
