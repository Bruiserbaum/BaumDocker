# Authentik — open-source identity provider and SSO
# See .env.example for required variables

services:

  postgresql:
    image: postgres:16-alpine
    container_name: authentik-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS}
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: authentik-redis
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    networks:
      - internal

  server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-latest}
    container_name: authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      # Optional email for password resets and notifications
      # AUTHENTIK_EMAIL__HOST: ${EMAIL_HOST}
      # AUTHENTIK_EMAIL__PORT: ${EMAIL_PORT:-587}
      # AUTHENTIK_EMAIL__USERNAME: ${EMAIL_USERNAME}
      # AUTHENTIK_EMAIL__PASSWORD: ${EMAIL_PASSWORD}
      # AUTHENTIK_EMAIL__USE_TLS: ${EMAIL_USE_TLS:-true}
      # AUTHENTIK_EMAIL__FROM: ${EMAIL_FROM}
    volumes:
      - data:/data
      - ./media:/media
      - ./custom-templates:/templates
    ports:
      - "${AUTHENTIK_HTTP_PORT:-9100}:9000"
      - "${AUTHENTIK_HTTPS_PORT:-9144}:9443"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - default

  worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-latest}
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    # Worker runs as root to manage Docker socket and write to media/certs
    user: root
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      # Optional email (must match server if set)
      # AUTHENTIK_EMAIL__HOST: ${EMAIL_HOST}
      # AUTHENTIK_EMAIL__PORT: ${EMAIL_PORT:-587}
      # AUTHENTIK_EMAIL__USERNAME: ${EMAIL_USERNAME}
      # AUTHENTIK_EMAIL__PASSWORD: ${EMAIL_PASSWORD}
      # AUTHENTIK_EMAIL__USE_TLS: ${EMAIL_USE_TLS:-true}
      # AUTHENTIK_EMAIL__FROM: ${EMAIL_FROM}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
      - ./media:/media
      - ./certs:/certs
      - ./custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres:
  redis:
  data:

networks:
  internal:
    driver: bridge
