# ── Authentik Forward Auth ─────────────────────────────────────────────────────
# Paste this entire block into the "Advanced" tab of your Nginx Proxy Manager
# proxy host.  Replace AUTHENTIK_HOST with your Authentik IP/hostname (e.g. 192.168.5.12).
#
# Why location ~ "^/" instead of location /:
#   NPM auto-generates a location / block. Nginx rejects duplicate location /
#   blocks and the site goes down. A regex location (~ "^/") takes precedence
#   over NPM's prefix location / in nginx's matching order, so our block runs
#   for all requests and NPM's block is silently skipped — no config conflict.
#
# NPM variables used inside location blocks:
#   $forward_scheme  — http or https (from the Details tab)
#   $server          — upstream hostname/IP
#   $port            — upstream port
#
# Prerequisites in Authentik UI:
#   1. Admin → Applications → Providers → Create → Proxy Provider
#      Mode: Forward auth (single application)
#      External host: https://yourapp.yourdomain.com
#   2. Admin → Applications → Create → link the provider above
#   3. Admin → Outposts → authentik Embedded Outpost → Edit → add the new app
# ──────────────────────────────────────────────────────────────────────────────

# Authentik outpost — handles the auth_request subrequests
location /outpost.goauthentik.io {
    proxy_pass              http://AUTHENTIK_HOST:9100/outpost.goauthentik.io;
    proxy_pass_request_body off;
    proxy_set_header        Content-Length    "";
    proxy_set_header        X-Original-URL    $scheme://$http_host$request_uri;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Host              $http_host;
    internal;
}

# Redirect unauthenticated users to Authentik login
location @authentik_signin {
    internal;
    return 302 http://AUTHENTIK_HOST:9100/outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
}

# Regex location — takes precedence over NPM's auto-generated prefix "location /"
# so proxy_set_header directives here actually reach the upstream app.
location ~ "^/" {
    auth_request     /outpost.goauthentik.io/auth/nginx;
    error_page 401 = @authentik_signin;

    # Capture identity values from the Authentik auth response
    auth_request_set $authentik_set_cookie $upstream_http_set_cookie;
    auth_request_set $authentik_username   $upstream_http_x_authentik_username;
    auth_request_set $authentik_groups     $upstream_http_x_authentik_groups;
    auth_request_set $authentik_email      $upstream_http_x_authentik_email;
    auth_request_set $authentik_name       $upstream_http_x_authentik_name;
    auth_request_set $authentik_uid        $upstream_http_x_authentik_uid;

    # Inject identity headers into the request forwarded to the app
    add_header       Set-Cookie              $authentik_set_cookie;
    proxy_set_header X-authentik-username   $authentik_username;
    proxy_set_header X-authentik-groups     $authentik_groups;
    proxy_set_header X-authentik-email      $authentik_email;
    proxy_set_header X-authentik-name       $authentik_name;
    proxy_set_header X-authentik-uid        $authentik_uid;

    # Standard proxy headers
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $http_connection;

    # Proxy to the upstream using NPM's own variables
    proxy_pass $forward_scheme://$server:$port;
}
